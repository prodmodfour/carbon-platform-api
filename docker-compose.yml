name: carbon-platform-api

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${API_IMAGE_NAME:-carbon-platform-api}:${API_IMAGE_TAG:-local}
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    environment:
      CARBON_API_APP_NAME: ${CARBON_API_APP_NAME:-carbon-platform-api}
      CARBON_API_APP_VERSION: ${CARBON_API_APP_VERSION:-0.1.0}
      CARBON_API_ENVIRONMENT: ${CARBON_API_ENVIRONMENT:-local}
      CARBON_API_LOG_LEVEL: ${CARBON_API_LOG_LEVEL:-INFO}
      CARBON_API_DOCS_ENABLED: ${CARBON_API_DOCS_ENABLED:-false}
      CARBON_API_DATABASE_URL: ${CARBON_API_DATABASE_URL:-postgresql+asyncpg://carbon_platform_api:local_dev_password@postgres:5432/carbon_platform_api}
      CARBON_API_REDIS_URL: ${CARBON_API_REDIS_URL:-redis://redis:6379/0}
      CARBON_API_CARBON_INTENSITY_PROVIDER_BASE_URL: ${CARBON_API_CARBON_INTENSITY_PROVIDER_BASE_URL:-https://carbon-intensity.example.invalid}
      CARBON_API_CARBON_INTENSITY_PROVIDER_TIMEOUT_SECONDS: ${CARBON_API_CARBON_INTENSITY_PROVIDER_TIMEOUT_SECONDS:-2.0}
      CARBON_API_CARBON_INTENSITY_CACHE_TTL_SECONDS: ${CARBON_API_CARBON_INTENSITY_CACHE_TTL_SECONDS:-900}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import json, urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)) == {'status': 'ok'}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-16-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carbon_platform_api}
      POSTGRES_USER: ${POSTGRES_USER:-carbon_platform_api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_dev_password}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:${REDIS_IMAGE_TAG:-7-alpine}
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
